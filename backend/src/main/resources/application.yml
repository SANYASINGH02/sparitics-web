spring:
  application:
    name: sparitics-backend

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:sparitics_web}?useSSL=${DB_SSL:false}&allowPublicKeyRetrieval=true&serverTimezone=UTC&requireSSL=${DB_SSL:false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

    # HikariCP connection pool (active by default with spring-boot-starter-data-jpa)
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      pool-name: SpariticsHikariPool

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        jdbc:
          batch_size: 500
        order_inserts: true
        format_sql: true


server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:sparitics-default-secret-key-change-in-production-min-256-bits-long}
  expiration-ms: ${JWT_EXPIRATION:86400000}
